name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_build
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx prisma validate

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_build
          JWT_SECRET: ci-build-secret-min-32-chars-long
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: |
          npm run db:deploy
          npm run build

      - run: npm test
